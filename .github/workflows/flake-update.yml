name: Nix flakes update
on:
  push:
    branches:
      - main
    paths-ignore:
      - flake.lock
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  flake-update:
    name: Update flakes
    runs-on: ubuntu-latest
    env:
      COMMIT_TOKEN_GITHUB: ${{ secrets.COMMIT_TOKEN_GITHUB }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.COMMIT_TOKEN_GITHUB }}

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.COMMIT_TOKEN_GITHUB }}

      - name: Update flakes
        run: nix --extra-experimental-features nix-command --extra-experimental-features flakes flake update

      - name: Configure git, stage changes
        id: stage
        run: |
          git config user.email "adathor+flakes@opensuse.org"
          git config user.name "Flake Updater (unstable)"
          git add .
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Automatic flake update"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Evaluate and test flakes
        run: nix --extra-experimental-features nix-command --extra-experimental-features flakes flake check --no-build --option eval-cache false --show-trace

      - name: Commit and push
        if: steps.stage.outputs.changed == 'true'
        run: |
          git config user.email "adathor+flakes@opensuse.org"
          git config user.name "Flake Updater (unstable)"
          git add .
          git commit -m "Automatic flake update" || true
          git push

  notify:
    name: Notify on status
    runs-on: ubuntu-latest
    needs: [flake-update]
    steps:
      - name: Notification on success
        uses: lkiesow/matrix-notification@v1
        if: ${{ always() && needs.flake-update.result == 'success' }}
        with:
          server: matrix.adathor.com
          token: ${{ secrets.MATRIX_TOKEN }}
          room: "!idoHctmVWleQXBCheb:matrix.adathor.com"
          message: "🍏 Flakes updated successfully.${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          tool: false
      - name: Notification on failure
        uses: lkiesow/matrix-notification@v1
        if: ${{ always() && (needs.flake-update.result != 'success' ) }}
        with:
          server: matrix.adathor.com
          token: ${{ secrets.MATRIX_TOKEN }}
          room: "!idoHctmVWleQXBCheb:matrix.adathor.com"
          message: "🍎 Flakes update failed. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          tool: false
